name: pr
on: pull_request
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Install php
        if: matrix.os == 'macos-latest'
        run: brew install php
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version: 1.25
      - name: Set up Swift
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.1"
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: sbt clean test

  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Check formatting
        run: sbt scalafmtCheck Test/scalafmtCheck
      - run: echo "Previous step failed because code is not formatted. Run 'sbt scalafmt Test/scalafmt'"
        if: ${{ failure() }}
      - name: Validate CITATION.cff
        uses: dieghernan/cff-validator@v4

  linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Run scalafix linting
        run: |
          # Get base branch
          BASE_BRANCH="${{ github.base_ref }}"

          # Get list of changed Scala files (excluding linter-rules/)
          CHANGED_FILES=$(git diff --name-only --diff-filter=d origin/$BASE_BRANCH...HEAD | grep '\.scala$' | grep -v '^linter-rules/' || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No Scala files changed in this PR, running RestrictedImports on entire codebase"
            sbt "scalafix RestrictedImports"
          else
            echo "Changed Scala files:"
            echo "$CHANGED_FILES"

            # Build scalafix command with repeated --files and --rules flags (as per scalafix docs)
            FILES_ARGS=""
            for file in $CHANGED_FILES; do
              FILES_ARGS="$FILES_ARGS --files $file"
            done

            echo "Running linters on changed files..."
            sbt "scalafix $FILES_ARGS --rules RestrictedImports --rules SingleLetterIdentifiers"
          fi
      - run: echo "Previous step failed because certain coding quality expectations were violated. Please check the logs."
        if: ${{ failure() }}

  test-scripts:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: Install coreutils
        if: matrix.os == 'macos-latest'
        run: brew install coreutils
      - name: Install php
        if: matrix.os == 'macos-latest'
        run: brew install php
      - name: Install Python dependencies for distribution test (Linux, MacOS)
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest'
        run: |
          python -m pip install requests pexpect
      - name: Install Python dependencies for distribution test (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          python -m pip install setuptools<81
          python -m pip install requests wexpect
      - name: Test distribution
        run: |
          sbt joerncli/stage querydb/createDistribution
          python -u ./testDistro.py
